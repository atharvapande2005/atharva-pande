<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Fablab Portfolio</title>

<style>

/* Reset */
body{
margin:0;
font-family: Arial, sans-serif;
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Animated Gradient Background */
body{
background: linear-gradient(270deg, #ff6b6b, #6b6bff, #00c9a7);
background-size: 600% 600%;
animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Container */
.container{
position:relative;
}

/* Text */
.text{
font-size:42px;
opacity:0;
position:absolute;
left:50%;
transform:translateX(-50%);
white-space:nowrap;
}

.active{
opacity:1;
transform:translateX(-50%);
}


/* Button */
button{
margin-top:120px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:25px;
cursor:pointer;
background:white;
color:black;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:black;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="text active">Welcome to My Portfolio</div>
<div class="text">Future Web Developer</div>
<div class="text">Digital Fab Lab Student</div>

<a href="portfolio2.html">
<button>Visit Portfolio</button>
</a>

</div>

<script>

let texts = document.querySelectorAll(".text");
let index = 0;

function showText(){
texts.forEach(t => t.classList.remove("active"));
texts[index].classList.add("active");
index = (index + 1) % texts.length;
}

setInterval(showText, 4000);

</script>

</body>
</html>
